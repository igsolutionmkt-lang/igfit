// Converte markdown (igual ao MDRenderer) para HTML bonito para o PDF
function mdToHTML(content,color){
  color=color||"#16a34a";
  const lines=content.split("\n");
  let html="";
  for(const raw of lines){
    const line=raw.trim();
    if(!line){html+="<div style='height:5px'></div>";continue;}
    // Headings com ##
    if(line.startsWith("## ")||line.startsWith("### ")){
      const txt=line.replace(/^#+\s*/,"").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
      html+=`<div style="background:${color}18;border-left:3px solid ${color};padding:7px 12px;border-radius:0 6px 6px 0;margin:14px 0 7px;font-size:10.5pt;font-weight:700;color:${color}">${txt}</div>`;
      continue;
    }
    // # heading
    if(line.startsWith("# ")){
      const txt=line.replace(/^# /,"").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
      html+=`<div style="font-size:13pt;font-weight:800;color:#0f172a;margin:16px 0 6px">${txt}</div>`;
      continue;
    }
    // Emoji-led section
    if(/^[\u{1F300}-\u{1FFFF}\u2600-\u27FF\u{1F000}-\u{1FFFF}\u26A0\u2705\u274C]/u.test(line)){
      const txt=line.replace(/\*\*/g,"");
      html+=`<div style="background:${color}12;border-left:3px solid ${color};padding:7px 12px;border-radius:0 6px 6px 0;margin:14px 0 7px;font-size:10.5pt;font-weight:700;color:${color}">${txt}</div>`;
      continue;
    }
    // HR
    if(/^[-=─━]{3,}$/.test(line)){html+="<hr style='border:none;border-top:1px solid #e2e8f0;margin:10px 0'>";continue;}
    // Bold-only
    if(line.startsWith("**")&&line.endsWith("**")){
      html+=`<div style="font-size:10pt;font-weight:700;color:#0f172a;margin:10px 0 4px">${line.replace(/\*\*/g,"")}</div>`;
      continue;
    }
    // List item
    if(line.startsWith("- ")||line.startsWith("• ")||line.startsWith("▶ ")||line.startsWith("▸ ")){
      const txt=line.replace(/^[-•▶▸]\s+/,"").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
      html+=`<div style="display:flex;gap:8px;padding:2px 0;padding-left:4px"><span style="color:${color};flex-shrink:0">▸</span><span style="font-size:9.5pt;color:#334155;line-height:1.7">${txt}</span></div>`;
      continue;
    }
    // Numbered
    const nm=line.match(/^(\d+)[.)]\s+(.*)/);
    if(nm){
      const txt=nm[2].replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
      html+=`<div style="display:flex;gap:10px;padding:2px 0;padding-left:4px;align-items:flex-start"><span style="background:${color};color:#fff;border-radius:50%;width:18px;height:18px;font-size:9pt;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px">${nm[1]}</span><span style="font-size:9.5pt;color:#334155;line-height:1.7">${txt}</span></div>`;
      continue;
    }
    // Normal
    const txt=line.replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/\*([^*]+)\*/g,"<em>$1</em>");
    html+=`<p style="font-size:9.5pt;color:#334155;line-height:1.75;margin:3px 0">${txt}</p>`;
  }
  return html;
}

async function getPDFBase64(title,studentName,content,type){
  // Gera HTML e converte para base64 para enviar como anexo
  const html=buildPDFHTML(title,studentName,content,type);
  const bytes=new TextEncoder().encode(html);
  let binary="";
  bytes.forEach(b=>{binary+=String.fromCharCode(b);});
  return{
    base64:btoa(binary),
    filename:`${title.replace(/ /g,"_")}_${studentName.replace(/ /g,"_")}.html`,
    contentType:"text/html"
  };
}


const G="#16a34a",GL="#dcfce7",GD="#14532d",BLU="#2563eb",BLL="#dbeafe",BLD="#1e3a8a",RED="#dc2626",RLL="#fee2e2",ALL="#fef3c7",GR="#64748b";

// Markdown renderer — converts AI output to clean HTML
function MDRenderer({content,color}){
  if(!content)return null;
  color=color||G;
  const lines=content.split("\n");
  const els=[];
  let i=0;
  while(i<lines.length){
    const raw=lines[i];
    const line=raw.trim();
    i++;
    if(!line){els.push(<div key={i} style={{height:6}}/>);continue;}

    // Remove markdown heading symbols
    if(line.startsWith("# ")||line.startsWith("## ")||line.startsWith("### ")){
      const txt=line.replace(/^#+\s*/,"");
      // Check if it's a section with emoji
      const hasEmoji=/^[\u{1F300}-\u{1FFFF}\u2600-\u27FF\u{1F000}-\u{1FFFF}]/u.test(txt);
      els.push(
        <div key={i} style={{background:color+"15",borderLeft:`3px solid ${color}`,padding:"8px 14px",borderRadius:"0 8px 8px 0",margin:"16px 0 8px",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14,fontWeight:700,color}}>{txt}</span>
        </div>
      );
      continue;
    }

    // Emoji-led section headers (e.g. "📋 PERFIL FÍSICO")
    if(/^[\u{1F300}-\u{1FFFF}\u2600-\u27FF\u{1F000}-\u{1FFFF}\u26A0\u2705\u274C\u{1F50D}]/u.test(line)){
      els.push(
        <div key={i} style={{background:color+"12",borderLeft:`3px solid ${color}`,padding:"8px 14px",borderRadius:"0 8px 8px 0",margin:"16px 0 8px",fontSize:13,fontWeight:700,color}}>
          {line.replace(/\*\*/g,"")}
        </div>
      );
      continue;
    }

    // Horizontal rules
    if(/^[-=─━]{3,}$/.test(line)||/^[─━]{2,}/.test(line)){
      els.push(<hr key={i} style={{border:"none",borderTop:"1px solid #e2e8f0",margin:"12px 0"}}/>);
      continue;
    }

    // List items
    if(line.startsWith("- ")||line.startsWith("• ")||line.startsWith("▶ ")||line.startsWith("▸ ")){
      const txt=line.replace(/^[-•▶▸]\s+/,"").replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>");
      els.push(
        <div key={i} style={{display:"flex",gap:8,padding:"3px 0",paddingLeft:4}}>
          <span style={{color,flexShrink:0,marginTop:2}}>▸</span>
          <span style={{fontSize:13,color:"#334155",lineHeight:1.7}} dangerouslySetInnerHTML={{__html:txt}}/>
        </div>
      );
      continue;
    }

    // Numbered items
    const numMatch=line.match(/^(\d+)[.)]\s+(.*)/);
    if(numMatch){
      const txt=numMatch[2].replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>");
      els.push(
        <div key={i} style={{display:"flex",gap:10,padding:"3px 0",paddingLeft:4}}>
          <span style={{background:color,color:"#fff",borderRadius:"50%",width:20,height:20,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{numMatch[1]}</span>
          <span style={{fontSize:13,color:"#334155",lineHeight:1.7}} dangerouslySetInnerHTML={{__html:txt}}/>
        </div>
      );
      continue;
    }

    // Bold-only line = sub-header
    if(line.startsWith("**")&&line.endsWith("**")){
      els.push(<div key={i} style={{fontSize:13,fontWeight:700,color:"#0f172a",margin:"12px 0 4px"}}>{line.replace(/\*\*/g,"")}</div>);
      continue;
    }

    // Normal paragraph
    const txt=line.replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>").replace(/\*([^*]+)\*/g,"<i>$1</i>");
    els.push(<p key={i} style={{fontSize:13,color:"#334155",lineHeight:1.75,margin:"3px 0"}} dangerouslySetInnerHTML={{__html:txt}}/>);
  }
  return <div style={{fontFamily:"'Inter',sans-serif"}}>{els}</div>;
}

// Smart alerts generator
function generateAlerts(student){
  const alerts=[];
  const logs=student.classLogs||[];
  const m=student.measurements||[];
  const a=student.anamnesis||{};
  const now=new Date();

  // Faltas recentes
  const last5=logs.slice(0,5);
  const faltas=last5.filter(x=>x.status==="Faltou").length;
  if(faltas>=2) alerts.push({type:"warning",msg:`${faltas} faltas nas últimas 5 aulas — verificar aderência`});

  // Dor recorrente
  const dores=logs.slice(0,4).filter(x=>x.pain>=4).length;
  if(dores>=2) alerts.push({type:"danger",msg:"Dor recorrente nas últimas aulas — ajustar plano"});

  // Sem medições há muito tempo
  if(m.length>0){
    const lastMeas=new Date(m[m.length-1].rawDate);
    const days=Math.floor((now-lastMeas)/(1000*60*60*24));
    if(days>30) alerts.push({type:"warning",msg:`Última medição há ${days} dias — nova avaliação necessária`});
  } else {
    alerts.push({type:"info",msg:"Nenhuma medição registada — adicionar avaliação física"});
  }

  // Estagnação de peso
  if(m.length>=3){
    const last3=m.slice(-3);
    const diff=Math.abs(last3[2].weight-last3[0].weight);
    if(diff<0.3) alerts.push({type:"info",msg:"Peso estagnado nas últimas 3 medições — rever estratégia"});
  }

  // Fatores de risco
  if(a.chestPain||a.shortBreath||a.dizziness) alerts.push({type:"danger",msg:"Sintomas de risco — validar com médico antes de aumentar intensidade"});
  if((a.heartProblems||a.hypertension)&&!a.medicalClearance) alerts.push({type:"danger",msg:"Condição cardíaca/HTA sem autorização médica confirmada"});

  // Energia baixa
  const lowEnergy=logs.slice(0,3).filter(x=>x.energy<=4).length;
  if(lowEnergy>=2) alerts.push({type:"warning",msg:"Energia baixa nas últimas sessões — verificar descanso e recuperação"});

  return alerts;
}

// Gráfico SVG simples
function LineGraph({data,dataKey,color,unit}){
  if(!data||data.length<2)return null;
  const vals=data.map(d=>d[dataKey]).filter(v=>v!=null&&!isNaN(v));
  if(vals.length<2)return null;
  const W=500,H=120,padL=40,padR=10,padT=10,padB=24;
  const minV=Math.min(...vals),maxV=Math.max(...vals);
  const range=maxV-minV||1;
  const xs=data.map((_,i)=>padL+(i/(data.length-1))*(W-padL-padR));
  const ys=data.map(d=>padT+((maxV-(d[dataKey]||minV))/range)*(H-padT-padB));
  const path=xs.map((x,i)=>`${i===0?"M":"L"}${x},${ys[i]}`).join(" ");
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}}>
      <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
      {data.map((d,i)=>(
        <g key={i}>
          <circle cx={xs[i]} cy={ys[i]} r="4" fill={color}/>
          <text x={xs[i]} y={H-4} textAnchor="middle" fontSize="9" fill={GR}>{d.label}</text>
          <text x={xs[i]} y={ys[i]-8} textAnchor="middle" fontSize="9" fill={color} fontWeight="600">{d[dataKey]}{unit}</text>
        </g>
      ))}
    </svg>
  );
}

  {v:"Reduzir gordura abdominal",i:"🎯",d:"Foco no centro do corpo"},
  {v:"Ganhar força muscular",i:"💪",d:"Músculos mais fortes e funcionais"},
  {v:"Melhorar mobilidade",i:"🦵",d:"Mais flexibilidade e amplitude"},
  {v:"Melhorar equilíbrio",i:"🧘",d:"Prevenir quedas e ganhar estabilidade"},
  {v:"Melhorar postura",i:"🏋️",d:"Coluna alinhada e menos dores"},
  {v:"Reduzir dores crónicas",i:"🩹",d:"Menos dor nas costas, joelhos, ombros"},
  {v:"Aumentar energia e disposição",i:"⚡",d:"Mais ânimo para o dia a dia"},
  {v:"Criar rotina de exercício",i:"📅",d:"Hábito consistente e saudável"},
  {v:"Melhorar saúde metabólica",i:"❤️",d:"Pressão, colesterol, diabetes"},
  {v:"Prevenir perda muscular",i:"🛡️",d:"Manter massa muscular com a idade"},
  {v:"Mais autonomia e independência",i:"🚶",d:"Fazer tudo sozinho sem esforço"},
];

function GoalPicker({value,onChange,label,exclude}){
  const opts=GOALS.filter(g=>g.v!==exclude);
  return(
    <div style={{marginBottom:16}}>
      <label style={{fontSize:12,color:"#64748b",fontWeight:600,marginBottom:8,display:"block",textTransform:"uppercase",letterSpacing:".4px"}}>{label}</label>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
        {opts.map(g=>{
          const sel=value===g.v;
          return(
            <button key={g.v} onClick={()=>onChange(g.v)} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,border:sel?"2px solid #16a34a":"1.5px solid #e2e8f0",background:sel?"#f0fdf4":"#fff",cursor:"pointer",textAlign:"left",transition:"all .15s"}}>
              <span style={{fontSize:18,flexShrink:0}}>{g.i}</span>
              <div style={{minWidth:0}}>
                <div style={{fontSize:12,fontWeight:sel?700:500,color:sel?"#14532d":"#0f172a",lineHeight:1.2}}>{g.v}</div>
                <div style={{fontSize:10,color:"#94a3b8",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{g.d}</div>
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}
const SEL="igfit_students?select=*,igfit_anamnesis(*),igfit_measurements(*),igfit_class_logs(*),igfit_ai_outputs(*),igfit_alerts(*)&order=created_at.desc";
const CONDS=[["hypertension","HTA"],["diabetes","Diabetes"],["highCholesterol","Colesterol"],["heartProblems","Cardíaco"],["osteoporosis","Osteoporose"],["arthrosis","Artrose"],["hernia","Hérnia"],["lowerBackPain","Lombar"],["kneePain","Joelhos"],["shoulderPain","Ombros"],["hadSurgery","Cirurgia"],["recentFalls","Quedas"],["dizziness","Tonturas"]];

// Estilos partilhados
const C={background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",padding:"16px 18px",marginBottom:12};
const BTN={background:G,color:"#fff",border:"none",borderRadius:8,padding:"10px 20px",fontSize:14,fontWeight:600,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:6};
const BTNO={...BTN,background:"transparent",color:G,border:`1.5px solid ${G}`};
const BS={...BTN,padding:"7px 14px",fontSize:13,borderRadius:6};
const BG={...BS,background:"#f1f5f9",color:GR,border:"1px solid #e2e8f0"};
const BBLU={...BTN,background:BLU};
const INP={width:"100%",padding:"9px 12px",borderRadius:8,border:"1px solid #cbd5e1",fontSize:14,outline:"none",boxSizing:"border-box"};
const LBL={fontSize:12,color:GR,fontWeight:600,marginBottom:4,display:"block",textTransform:"uppercase",letterSpacing:".4px"};

function sc(st){
  if(st==="ativo")return{background:GL,color:GD};
  if(st==="em evolução")return{background:BLL,color:BLD};
  if(st==="avaliação pendente")return{background:ALL,color:"#713f12"};
  if(st==="atenção")return{background:RLL,color:"#7f1d1d"};
  return{background:"#f1f5f9",color:GR};
}
function lsc(st){
  if(st==="Concluído")return{background:GL,color:GD};
  if(st==="Faltou")return{background:RLL,color:"#7f1d1d"};
  if(st==="Parcial")return{background:ALL,color:"#713f12"};
  return{background:"#e0f2fe",color:"#0c4a6e"};
}
function aIcon(t){return t==="danger"?"⛔":t==="warning"?"⚠️":"ℹ️";}
function aBg(t){
  if(t==="danger")return{background:RLL,border:"1px solid #fca5a5"};
  if(t==="warning")return{background:ALL,border:"1px solid #fcd34d"};
  return{background:BLL,border:"1px solid #93c5fd"};
}

function App(){
  // ─── Sessão persistente via localStorage ───────────────
  const[view,setView]=useState(()=>{
    try{const s=localStorage.getItem("igfit_sess");return s?"dashboard":"login";}catch{return"login";}
  });
  const[sess,setSess]=useState(()=>{
    try{const s=localStorage.getItem("igfit_sess");return s?JSON.parse(s):null;}catch{return null;}
  });

  function saveSess(s){
    setSess(s);
    try{if(s)localStorage.setItem("igfit_sess",JSON.stringify(s));else localStorage.removeItem("igfit_sess");}catch{}
  }

  const[students,setStudents]=useState([]);
  const[sid,setSid]=useState(null);
  const[tab,setTab]=useState("overview");
  const[loading,setLoading]=useState(false);
  const[aiLoad,setAiLoad]=useState(false);
  const[aiOut,setAiOut]=useState("");
  const[fb,setFb]=useState("");
  const[showAdj,setShowAdj]=useState(false);
  const[isReg,setIsReg]=useState(false);
  const[lE,setLE]=useState("");
  const[lP,setLP]=useState("");
  const[lErr,setLErr]=useState("");
  const[step,setStep]=useState(0);
  const[ns,setNs]=useState(EMPTY);
  const[newLog,setNewLog]=useState({date:"",training:"Treino A",status:"Concluído",effort:7,pain:1,energy:8,notes:""});
  const[showLog,setShowLog]=useState(false);
  const[newM,setNewM]=useState({weight:"",waist:"",abdomen:""});
  const[showM,setShowM]=useState(false);
  const[err,setErr]=useState("");
  const[showEdit,setShowEdit]=useState(false);
  const[editData,setEditData]=useState({});
  const[emailSending,setEmailSending]=useState(false);
  const[emailMsg,setEmailMsg]=useState("");

  const s=students.find(x=>x.id===sid);
  const tok=sess?.access_token;

  async function load(t){
    setLoading(true);setErr("");
    try{
      const rows=await sbGet(SEL,t||tok);
      setStudents(rows.map(fromDB));
    }catch(e){
      // Token expirado — limpa sessão
      if(String(e).includes("401")||String(e).includes("JWT")){
        saveSess(null);setView("login");setStudents([]);
      } else setErr(e.message);
    }
    setLoading(false);
  }

  // Carrega alunos ao iniciar se já tem sessão
  useEffect(()=>{
    if(tok){
      // Valida se o token ainda é válido fazendo um pedido leve
      sbGet("igfit_students?select=id&limit=1",tok)
        .then(()=>load(tok))
        .catch(()=>{saveSess(null);setView("login");});
    }
  },[tok]);

  async function auth(){
    setLErr("");setLoading(true);
    const d=await sbAuth(lE,lP,isReg?"signup":"login");
    setLoading(false);
    if(d.access_token){saveSess(d);setView("dashboard");}
    else if(d.id&&isReg){setLErr("Conta criada! Confirma o email e faz login.");setIsReg(false);}
    else setLErr(d.error_description||d.msg||"Email ou palavra-passe incorretos.");
  }

  function setA(k,v){setNs(p=>({...p,anamnesis:{...p.anamnesis,[k]:v}}));}

  async function saveStudent(){
    if(!ns.name.trim()){setErr("Nome obrigatório.");return;}
    setLoading(true);setErr("");
    try{
      const risk=ns.anamnesis.chestPain||ns.anamnesis.heartProblems||ns.anamnesis.dizziness||ns.anamnesis.recentFalls||ns.anamnesis.shortBreath;
      const[row]=await sbPost("igfit_students",{trainer_id:sess.user.id,name:ns.name,age:parseInt(ns.age)||null,sex:ns.sex,phone:ns.phone||null,email:ns.email||null,height:parseFloat(ns.height)||null,weight:parseFloat(ns.weight)||null,target_weight:parseFloat(ns.targetWeight)||null,profession:ns.profession||null,sessions_per_week:ns.sessionsPerWeek,session_duration:ns.sessionDuration,primary_goal:ns.primaryGoal,secondary_goal:ns.secondaryGoal,motivation_level:ns.motivationLevel,location:ns.location,status:risk?"atenção":"avaliação pendente"},tok);
      await sbPost("igfit_anamnesis",{student_id:row.id,hypertension:ns.anamnesis.hypertension,diabetes:ns.anamnesis.diabetes,high_cholesterol:ns.anamnesis.highCholesterol,heart_problems:ns.anamnesis.heartProblems,osteoporosis:ns.anamnesis.osteoporosis,arthrosis:ns.anamnesis.arthrosis,hernia:ns.anamnesis.hernia,lower_back_pain:ns.anamnesis.lowerBackPain,knee_pain:ns.anamnesis.kneePain,shoulder_pain:ns.anamnesis.shoulderPain,had_surgery:ns.anamnesis.hadSurgery,recent_falls:ns.anamnesis.recentFalls,dizziness:ns.anamnesis.dizziness,short_breath:ns.anamnesis.shortBreath,chest_pain:ns.anamnesis.chestPain,medication:ns.anamnesis.medication||null,medical_clearance:ns.anamnesis.medicalClearance,forbidden_exercises:ns.anamnesis.forbiddenExercises||null,biggest_fear:ns.anamnesis.biggestFear||null},tok);
      await sbPost("igfit_alerts",{student_id:row.id,type:risk?"danger":"info",message:risk?"Fatores de risco — validar com médico":"Avaliação inicial pendente"},tok);
      await load();setSid(row.id);setTab("overview");setView("student");setStep(0);setNs(EMPTY);
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  async function saveAI(type,content){
    await sbPost("igfit_ai_outputs",{student_id:sid,type,content},tok);
    setStudents(p=>p.map(x=>{
      if(x.id!==sid)return x;
      if(type==="diagnosis")return{...x,diagnosis:content};
      if(type==="training_plan")return{...x,trainingPlan:content};
      if(type==="monthly_report")return{...x,monthlyReport:content};
      return x;
    }));
  }

  async function genDiag(){
    if(!s)return;setAiLoad(true);
    const a=s.anamnesis;
    const cond=CONDS.filter(([k])=>a[k]).map(([,l])=>l).join(", ");
    const imc=s.weight&&s.height?((h=>s.weight/(h>3?h/100:h)**2)(s.height)).toFixed(1):"N/D";
    const prompt=`Diagnóstico inicial para:\n${s.name} | ${s.age}a | ${s.sex} | IMC: ${imc}\nPeso: ${s.weight}kg → alvo ${s.targetWeight}kg | Altura: ${s.height}cm\n${s.location} | ${s.sessionsPerWeek}x/sem | ${s.sessionDuration}min\nObjetivos: ${s.primaryGoal} + ${s.secondaryGoal}\nCondições: ${cond||"Nenhuma"} | Med: ${a.medication||"Nenhuma"}\nProibidos: ${a.forbiddenExercises||"Nenhum"} | Medo: ${a.biggestFear||"N/A"} | Autor.médica: ${a.medicalClearance?"Sim":"Não"}\n\nSeccções (usa ## com emoji):\n## 📋 Perfil Físico\n## 🎯 Prioridades (lista numerada, máx 5)\n## ⚠️ Pontos de Atenção (por condição de saúde)\n## ✅ Exercícios Recomendados\n## ❌ Exercícios a Evitar\n## 📈 Estratégia 4 Semanas (semana 1-2 e 3-4)\n## 🏆 Metas Realistas (1, 3 e 6 meses)\n## 🔒 Regras de Segurança (3-5 regras)\n\nTom: treinador experiente a falar com colega. Direto, humano, sem jargão excessivo. Máx 600 palavras.`;
    const r=await callAI(prompt,tok,{age:s.age,goals:s.primaryGoal+" "+s.secondaryGoal,conditions:cond});
    // Apaga TODOS os alertas antigos deste aluno antes de criar novos
    try{
      await fetch(`${SB}/rest/v1/igfit_alerts?student_id=eq.${s.id}`,{method:"DELETE",headers:hdrs(tok)});
    }catch(e){}
    // Cria apenas alertas únicos e relevantes
    const newAlerts=generateAlerts(s);
    const seen=new Set();
    for(const al of newAlerts){
      if(!seen.has(al.msg)){
        seen.add(al.msg);
        try{await sbPost("igfit_alerts",{student_id:s.id,type:al.type,message:al.msg},tok);}catch(e){}
      }
    }
    await saveAI("diagnosis",r);setAiLoad(false);
  }

  async function genPlan(){
    if(!s)return;setAiLoad(true);
    const a=s.anamnesis;
    const cond=CONDS.filter(([k])=>a[k]).map(([,l])=>l).join(", ");
    const meta={age:s.age,goals:s.primaryGoal+" "+s.secondaryGoal,conditions:cond};
    const ctx=`Aluno: ${s.name} | ${s.age}a | ${s.sex} | ${s.location} | ${s.sessionDuration}min | Obj: ${s.primaryGoal}+${s.secondaryGoal} | Cond: ${cond||"Nenhuma"} | Proibidos: ${a.forbiddenExercises||"Nenhum"}`;

    const treinos=s.sessionsPerWeek>=3?["A","B","C"]:s.sessionsPerWeek>=2?["A","B"]:["A"];
    const focos={
      A:"Membros inferiores: pernas, glúteos, equilíbrio e cardio",
      B:"Tronco: costas, peito, ombros, core e postura",
      C:"Corpo inteiro: mobilidade, coordenação e resistência"
    };

    const buildPrompt=(letra)=>`${ctx}

Cria o TREINO ${letra} completo — ${focos[letra]||"Corpo inteiro"}.
Usa exatamente esta estrutura:

## 🔥 Treino ${letra} — [nome descritivo]
📅 Dia sugerido: [ex: Segunda-feira]
⏱️ Duração: ${s.sessionDuration} minutos

## 🔄 Aquecimento (5 min)
[3 exercícios. Formato: - **Nome** — como fazer em 1 linha — duração]

## 🦵 Mobilidade (5 min)
[3 exercícios. Formato: - **Nome** — como fazer — X reps cada lado]

## 💪 Treino Principal (${s.sessionDuration-20} min)
[5-6 exercícios. Para cada um:]
**[Nome do Exercício]**
- Como fazer: [passo a passo em 2-3 linhas]
- Séries/Reps: [X séries × X reps] | Descanso: [X seg]
- Intensidade: [X/10]
- ⚠️ Cuidado: [erro comum]
- 🔄 Alternativa: [se sentir dor]

## 🚶 Cardio (5-10 min)
[tipo, duração, intensidade]

## 🧘 Alongamento Final (5 min)
[3-4 alongamentos. Formato: - **Músculo** — posição — X segundos]

⚕️ Segurança: [2 avisos específicos para este aluno]`;

    let fullPlan="";
    let planDate=new Date().toLocaleDateString("pt-PT",{day:"2-digit",month:"long",year:"numeric"});
    fullPlan+=`# 📋 Plano de Treino — ${s.name}\n**Método igfit** | Gerado em ${planDate} | ${s.sessionsPerWeek}x/semana | ${s.sessionDuration}min/aula\n\n---\n\n`;

    for(const letra of treinos){
      const partPrompt=buildPrompt(letra);
      const part=await callAI(partPrompt,tok,meta);
      fullPlan+=part+"\n\n---\n\n";
    }

    fullPlan+=`## 📅 Plano Semanal\n`;
    const dias=["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
    if(treinos.length===1) fullPlan+=`- **${dias[0]}** — Treino A\n- Restantes dias: Descanso ativo (caminhada leve)\n`;
    else if(treinos.length===2) fullPlan+=`- **${dias[0]}** — Treino A\n- **${dias[2]}** — Treino B\n- Restantes dias: Descanso ativo\n`;
    else fullPlan+=`- **${dias[0]}** — Treino A\n- **${dias[1]}** — Treino B\n- **${dias[3]}** — Treino C\n- Restantes dias: Descanso ativo (caminhada 20-30 min)\n`;

    await saveAI("training_plan",fullPlan);setAiLoad(false);
  }

  async function adjPlan(){
    if(!s||!fb.trim())return;setAiLoad(true);
    const prompt=`Treinador de ${s.name} (${s.age}a | ${s.primaryGoal}) deu feedback: "${fb}"\n\nResponde com ajuste ao plano:\n## 🔍 O que isto indica\n## ⚡ Ajustes concretos (exercício → o que muda)\n## 🔄 Substituições (original → substituto → razão)\n## 📊 Volume/Intensidade (aumentar/reduzir o quê)\n## 🎯 Foco da próxima aula\n## 💡 Dica para o aluno\n\nDireto e implementável. Máx 300 palavras.`;
    const r=await callAI(prompt,tok,{age:s.age,goals:s.primaryGoal,conditions:""});
    setAiOut(r);setTab("plan");setAiLoad(false);setShowAdj(false);setFb("");
  }

  async function genReport(){
    if(!s)return;setAiLoad(true);
    const m=s.measurements;const f=m[0];const l=m[m.length-1];
    const logs=s.classLogs;
    const done=logs.filter(x=>x.status==="Concluído").length;
    const faltas=logs.filter(x=>x.status==="Faltou").length;
    const pct=logs.length>0?Math.round(done/logs.length*100):0;
    const dorMedia=logs.length>0?(logs.reduce((a,x)=>a+(x.pain||0),0)/logs.length).toFixed(1):"N/D";
    const energiaMedia=logs.length>0?(logs.reduce((a,x)=>a+(x.energy||0),0)/logs.length).toFixed(1):"N/D";
    const month=new Date().toLocaleDateString("pt-PT",{month:"long",year:"numeric"});
    const evolPeso=f&&l?(l.weight-f.weight).toFixed(1):"N/D";
    const prompt=`Relatório mensal — ${month}\n${s.name} | ${s.age}a | ${s.primaryGoal}\nFrequência: ${done}/${logs.length} aulas (${pct}%) | Faltas: ${faltas}\nPeso: ${f?f.weight:"?"}→${l?l.weight:"?"}kg (${evolPeso}kg) | Cintura: ${f?f.waist||"?":"?"}→${l?l.waist||"?":"?"}cm\nDor média: ${dorMedia}/10 | Energia média: ${energiaMedia}/10\n\n## 📋 Resumo do Mês\n## 📈 Evolução Física\n## ✅ Conquistas\n## 🏆 Pontos Positivos\n## ⚠️ Pontos de Atenção\n## 🎯 Objetivos Próximo Mês (3 metas)\n## 💡 Recomendações\n## 💪 Mensagem para ${s.name.split(" ")[0]}\n\nTom encorajador e humano. Máx 450 palavras.`;
    const r=await callAI(prompt,tok,{age:s.age,goals:s.primaryGoal,conditions:""});
    await saveAI("monthly_report",r);setAiLoad(false);
  }

  async function saveMeas(){
    if(!s||!newM.weight)return;setLoading(true);
    try{
      await sbPost("igfit_measurements",{student_id:s.id,measured_at:new Date().toISOString().split("T")[0],weight:parseFloat(newM.weight)||null,waist:parseFloat(newM.waist)||null,abdomen:parseFloat(newM.abdomen)||null},tok);
      await load();setShowM(false);setNewM({weight:"",waist:"",abdomen:""});
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  async function saveLog(){
    if(!s)return;setLoading(true);
    try{
      await sbPost("igfit_class_logs",{student_id:s.id,session_date:newLog.date||new Date().toISOString().split("T")[0],training:newLog.training,status:newLog.status,effort:newLog.effort,pain:newLog.pain,energy:newLog.energy,notes:newLog.notes||null},tok);
      await load();setShowLog(false);setNewLog({date:"",training:"Treino A",status:"Concluído",effort:7,pain:1,energy:8,notes:""});
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  const nsRisk=ns.anamnesis.chestPain||ns.anamnesis.heartProblems||ns.anamnesis.dizziness||ns.anamnesis.recentFalls||ns.anamnesis.shortBreath;

  async function saveEdit(){
    if(!s)return;setLoading(true);setErr("");
    try{
      const phdrs={...hdrs(tok),Prefer:"return=minimal"};
      await fetch(SB+"/rest/v1/igfit_students?id=eq."+s.id,{method:"PATCH",headers:phdrs,body:JSON.stringify({
        name:editData.name||s.name,
        age:parseInt(editData.age)||s.age,
        height:parseFloat(editData.height)||s.height,
        weight:parseFloat(editData.weight)||s.weight,
        target_weight:parseFloat(editData.targetWeight)||s.targetWeight,
        sex:editData.sex||s.sex,
        phone:editData.phone||s.phone,
        sessions_per_week:parseInt(editData.sessionsPerWeek)||s.sessionsPerWeek,
        session_duration:parseInt(editData.sessionDuration)||s.sessionDuration,
        primary_goal:editData.primaryGoal||s.primaryGoal,
        secondary_goal:editData.secondaryGoal||s.secondaryGoal,
        location:editData.location||s.location,
      })});
      await load();setShowEdit(false);setEditData({});
    }catch(e){setErr(e.message);}
    setLoading(false);
  }

  // ═══ LOGIN ════════════════════════════════════════════════
  if(view==="login")return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#f0fdf4,#dbeafe)",padding:16}}>
      <div style={{...C,width:"100%",maxWidth:380,padding:"2rem",boxShadow:"0 8px 32px rgba(0,0,0,.1)"}}>
        <div style={{textAlign:"center",marginBottom:"1.5rem"}}>
          <div style={{fontSize:52,lineHeight:1}}>💪</div>
          <div style={{fontSize:28,fontWeight:800,color:G,marginTop:10}}>IG Fit</div>
          <div style={{fontSize:13,color:GR,marginTop:4}}>Plataforma para Personal Trainers</div>
        </div>
        {lErr&&<div style={{background:RLL,color:RED,padding:"10px 12px",borderRadius:8,fontSize:13,marginBottom:14,fontWeight:500}}>{lErr}</div>}
        <div style={{marginBottom:12}}><label style={LBL}>Email</label><input style={INP} type="email" value={lE} onChange={e=>setLE(e.target.value)} onKeyDown={e=>e.key==="Enter"&&auth()} placeholder="trainer@email.com"/></div>
        <div style={{marginBottom:20}}><label style={LBL}>Palavra-passe</label><input style={INP} type="password" value={lP} onChange={e=>setLP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&auth()} placeholder="Mínimo 6 caracteres"/></div>
        <button style={{...BTN,width:"100%",justifyContent:"center",padding:13,fontSize:15,opacity:loading?.6:1}} onClick={auth} disabled={loading}>{loading?"A carregar...":isReg?"Criar conta":"Entrar"}</button>
        <div style={{textAlign:"center",marginTop:14}}>
          <button style={{background:"none",border:"none",color:BLU,fontSize:13,cursor:"pointer",textDecoration:"underline"}} onClick={()=>{setIsReg(!isReg);setLErr("");}}>
            {isReg?"Já tenho conta":"Criar nova conta de treinador"}
          </button>
        </div>
      </div>
    </div>
  );

  // ═══ DASHBOARD ════════════════════════════════════════════
  if(view==="dashboard"){
    const allA=students.flatMap(st=>st.alerts.filter(a=>a.type!=="info").map(a=>({...a,n:st.name,id:st.id})));
    const initials=n=>n.split(" ").slice(0,2).map(x=>x[0]||"").join("").toUpperCase();
    return(
      <div style={{minHeight:"100vh",background:"#f8fafc"}}>
        <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{maxWidth:860,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 16px",height:58}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:24}}>💪</span><span style={{fontSize:20,fontWeight:800,color:G}}>IG Fit</span></div>
            <div style={{display:"flex",gap:6}}>
              <button style={BG} onClick={()=>load()} disabled={loading} title="Atualizar">{loading?"...":"↺"}</button>
              <button style={BS} onClick={()=>{setStep(0);setNs(EMPTY);setView("new-student");}}>+ Novo aluno</button>
              <button style={{...BG,color:RED}} onClick={()=>{saveSess(null);setStudents([]);setView("login");}}>Sair</button>
            </div>
          </div>
        </div>
        <div style={{maxWidth:860,margin:"0 auto",padding:"20px 16px"}}>
          {err&&<div style={{background:RLL,color:RED,padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12,fontWeight:500}}>⚠️ {err}</div>}

          {/* Resumo do dia */}
          <div style={{background:"linear-gradient(135deg,#f0fdf4,#dbeafe)",borderRadius:12,padding:"14px 18px",marginBottom:14,border:"1px solid #e2e8f0"}}>
            <div style={{fontSize:11,fontWeight:700,color:GR,letterSpacing:".5px",marginBottom:6}}>RESUMO DO DIA — {new Date().toLocaleDateString("pt-PT",{weekday:"long",day:"2-digit",month:"long"}).toUpperCase()}</div>
            <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
              {[
                {l:"Aulas hoje",v:students.reduce((a,x)=>a+(x.sessionsPerWeek>=5?1:x.sessionsPerWeek>=3?0:0),0)||"—",i:"🗓️"},
                {l:"Alunos ativos",v:students.filter(x=>["ativo","em evolução"].includes(x.status)).length,i:"👥"},
                {l:"Alertas",v:students.reduce((a,x)=>a+x.alerts.filter(al=>al.type!=="info").length,0),i:"⚠️"},
                {l:"Total alunos",v:students.length,i:"📋"},
              ].map((m,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:20}}>{m.i}</span>
                  <div><div style={{fontSize:18,fontWeight:800,lineHeight:1}}>{m.v}</div><div style={{fontSize:11,color:GR}}>{m.l}</div></div>
                </div>
              ))}
            </div>
          </div>

          {/* Método igfit badge */}
          <div style={{background:"#0f172a",borderRadius:8,padding:"8px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:16}}>💪</span>
            <div><div style={{fontSize:12,fontWeight:700,color:"#fff",letterSpacing:".3px"}}>Método igfit</div><div style={{fontSize:11,color:"#64748b"}}>Segurança · Mobilidade · Força · Progressão sustentável</div></div>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
            {[
              {l:"Ativos",v:students.filter(x=>["ativo","em evolução"].includes(x.status)).length,i:"👥",bg:GL,c:GD},
              {l:"Atenção",v:students.filter(x=>x.alerts.some(a=>a.type==="danger")).length,i:"🚨",bg:RLL,c:RED},
              {l:"Aviso",v:students.filter(x=>x.alerts.some(a=>a.type==="warning")).length,i:"⚠️",bg:ALL,c:"#92400e"},
              {l:"Aulas/sem",v:students.reduce((a,x)=>a+(x.sessionsPerWeek||0),0),i:"🗓️",bg:BLL,c:BLD},
            ].map((m,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:10,border:"1px solid #e2e8f0",padding:"12px",textAlign:"center"}}>
                <div style={{fontSize:20}}>{m.i}</div>
                <div style={{fontSize:22,fontWeight:800,marginTop:2,color:m.v>0&&i>0?m.c:"#0f172a"}}>{m.v}</div>
                <div style={{fontSize:11,color:GR,marginTop:1}}>{m.l}</div>
              </div>
            ))}
          </div>

          {allA.length>0&&(
            <div style={{...C,marginBottom:14}}>
              <div style={{fontSize:13,fontWeight:700,marginBottom:10,color:RED,display:"flex",alignItems:"center",gap:6}}>🚨 Alertas que precisam de ação</div>
              {allA.slice(0,5).map((a,i)=>(
                <div key={i} style={{...aBg(a.type),borderRadius:8,padding:"9px 12px",marginBottom:6,display:"flex",gap:8,alignItems:"center",cursor:"pointer"}} onClick={()=>{setSid(a.id);setTab("overview");setView("student");setAiOut("");}}>
                  <span>{aIcon(a.type)}</span>
                  <div style={{flex:1}}>
                    <span style={{fontSize:13,fontWeight:600}}>{a.n}</span>
                    <span style={{fontSize:13,color:"#64748b"}}> — {a.msg}</span>
                  </div>
                  <span style={{color:"#cbd5e1",fontSize:16}}>›</span>
                </div>
              ))}
              {allA.length>5&&<div style={{fontSize:12,color:GR,textAlign:"center",marginTop:6}}>+{allA.length-5} alertas adicionais</div>}
            </div>
          )}

          <div style={C}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{fontSize:14,fontWeight:700}}>Alunos ({students.length})</div>
              <div style={{fontSize:11,color:GR}}>Clica para abrir perfil</div>
            </div>
            {loading&&students.length===0&&<div style={{textAlign:"center",color:GR,padding:"2.5rem"}}>A carregar alunos...</div>}
            {!loading&&students.length===0&&(
              <div style={{textAlign:"center",padding:"2.5rem"}}>
                <div style={{fontSize:48,marginBottom:12}}>👤</div>
                <div style={{color:GR,marginBottom:16}}>Nenhum aluno ainda.</div>
                <button style={BTN} onClick={()=>{setStep(0);setNs(EMPTY);setView("new-student");}}>+ Criar primeiro aluno</button>
              </div>
            )}
            {students.map((st,i)=>{
              const c=sc(st.status);
              const initials=st.name.split(" ").slice(0,2).map(x=>x[0]||"").join("").toUpperCase();
              return(
                <div key={st.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 0",borderBottom:i<students.length-1?"1px solid #f8fafc":"none",cursor:"pointer"}} onClick={()=>{setSid(st.id);setTab("overview");setView("student");setAiOut("");}}>
                  <div style={{width:42,height:42,borderRadius:"50%",background:GL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:800,color:GD,flexShrink:0}}>{initials}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:14,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{st.name}</div>
                    <div style={{fontSize:12,color:GR}}>{st.age}a · {st.primaryGoal} · {st.sessionsPerWeek}x/sem · {st.location}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                    {st.alerts.filter(a=>a.type!=="info").length>0&&<span style={{background:RLL,color:"#7f1d1d",borderRadius:20,padding:"2px 7px",fontSize:11,fontWeight:700}}>{st.alerts.filter(a=>a.type!=="info").length}</span>}
                    <span style={{...c,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600,whiteSpace:"nowrap"}}>{st.status}</span>
                    <span style={{color:"#cbd5e1",fontSize:18}}>›</span>
                  </div>
                </div>
              );
            })}
          </div>
          <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:16}}>⚕️ Ferramenta de apoio ao treinador. Não substitui avaliação médica, fisioterapêutica ou nutricional.</p>
        </div>
      </div>
    );
  }

  // ═══ NOVO ALUNO ═══════════════════════════════════════════
  if(view==="new-student"){
    const HQ=[["hypertension","Tem hipertensão?"],["diabetes","Tem diabetes?"],["highCholesterol","Tem colesterol alto?"],["heartProblems","Tem problemas cardíacos?",true],["osteoporosis","Tem osteoporose?"],["arthrosis","Tem artrose?"],["hernia","Tem hérnia?"],["lowerBackPain","Dores na lombar?"],["kneePain","Dores nos joelhos?"],["shoulderPain","Dores nos ombros?"],["hadSurgery","Já teve cirurgia?"],["recentFalls","Quedas nos últimos 12 meses?",true],["dizziness","Sente tonturas?",true],["shortBreath","Falta de ar fora do normal?",true],["chestPain","Dor no peito?",true]];
    const STEPS=["Dados","Saúde","Objetivos"];
    return(
      <div style={{minHeight:"100vh",background:"#f8fafc"}}>
        <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,zIndex:10}}>
          <div style={{maxWidth:700,margin:"0 auto",display:"flex",alignItems:"center",gap:12,padding:"0 16px",height:56}}>
            <button style={BG} onClick={()=>setView("dashboard")}>← Voltar</button>
            <span style={{fontSize:15,fontWeight:700}}>Novo aluno</span>
          </div>
        </div>
        <div style={{maxWidth:700,margin:"0 auto",padding:"20px 16px"}}>
          {err&&<div style={{background:RLL,color:RED,padding:"10px 14px",borderRadius:8,fontSize:13,marginBottom:12}}>{err}</div>}
          <div style={{display:"flex",gap:6,marginBottom:20}}>
            {STEPS.map((st,i)=><div key={i} style={{flex:1,textAlign:"center",padding:"8px 4px",borderRadius:8,fontSize:12,fontWeight:700,background:i===step?G:i<step?GL:"#f1f5f9",color:i===step?"#fff":i<step?GD:"#94a3b8",transition:"all .2s"}}>{i<step?"✓ ":""}{st}</div>)}
          </div>

          {step===0&&(
            <div style={C}>
              <div style={{fontSize:16,fontWeight:700,marginBottom:16}}>Dados pessoais</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                <div style={{gridColumn:"1/-1"}}><label style={LBL}>Nome completo *</label><input style={INP} value={ns.name} onChange={e=>setNs(p=>({...p,name:e.target.value}))} placeholder="Nome completo do aluno"/></div>
                {[["age","Idade","number"],["phone","Telefone","tel"],["email","Email","email"],["height","Altura (cm)","number"],["weight","Peso atual (kg)","number"],["targetWeight","Peso desejado (kg)","number"],["profession","Profissão","text"]].map(([k,l,t])=>(
                  <div key={k}><label style={LBL}>{l}</label><input style={INP} type={t} value={ns[k]||""} onChange={e=>setNs(p=>({...p,[k]:e.target.value}))}/></div>
                ))}
                {[["sex","Sexo",["Feminino","Masculino"]],["location","Local de treino",["Ginásio","Casa","Outdoor","Online"]],["sessionsPerWeek","Aulas por semana",[1,2,3,4,5]],["sessionDuration","Duração por aula",[30,45,60]]].map(([k,l,opts])=>(
                  <div key={k}><label style={LBL}>{l}</label><select style={INP} value={String(ns[k])} onChange={e=>setNs(p=>({...p,[k]:["sessionsPerWeek","sessionDuration"].includes(k)?parseInt(e.target.value):e.target.value}))}>{opts.map(o=><option key={o} value={o}>{k==="sessionDuration"?o+" min":o}</option>)}</select></div>
                ))}
              </div>
              <GoalPicker value={ns.primaryGoal} onChange={v=>setNs(p=>({...p,primaryGoal:v}))} label="🎯 Objetivo principal" exclude={ns.secondaryGoal}/>
              <GoalPicker value={ns.secondaryGoal} onChange={v=>setNs(p=>({...p,secondaryGoal:v}))} label="🥈 Objetivo secundário (opcional)" exclude={ns.primaryGoal}/>
              <div style={{marginTop:8,display:"flex",justifyContent:"flex-end"}}>
                <button style={BTN} onClick={()=>{if(!ns.name.trim()){setErr("Nome obrigatório.");return;}if(!ns.primaryGoal){setErr("Seleciona o objetivo principal.");return;}setErr("");setStep(1);}}>Próximo →</button>
              </div>
            </div>
          )}

          {step===1&&(
            <div style={C}>
              <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Questionário de saúde</div>
              <div style={{fontSize:12,color:GR,marginBottom:14}}>Preencha com base no historial do aluno</div>
              {HQ.map(([k,q,risk])=>(
                <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #f8fafc"}}>
                  <span style={{fontSize:13,color:risk?RED:"inherit",fontWeight:risk?600:400}}>{q}</span>
                  <div style={{display:"flex",gap:4}}>
                    {["Sim","Não"].map(v=><button key={v} style={{...BS,background:(ns.anamnesis[k]?v==="Sim":v==="Não")?G:"#f1f5f9",color:(ns.anamnesis[k]?v==="Sim":v==="Não")?"#fff":GR,padding:"5px 14px",fontSize:12}} onClick={()=>setA(k,v==="Sim")}>{v}</button>)}
                  </div>
                </div>
              ))}
              <div style={{marginTop:14}}><label style={LBL}>Medicação atual</label><input style={INP} value={ns.anamnesis.medication} onChange={e=>setA("medication",e.target.value)} placeholder="Ex: Amlodipina 5mg, Sinvastatina 20mg"/></div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderTop:"1px solid #f1f5f9",marginTop:10}}>
                <span style={{fontSize:13,fontWeight:600}}>Autorização médica para treinar?</span>
                <div style={{display:"flex",gap:4}}>{["Sim","Não"].map(v=><button key={v} style={{...BS,background:(ns.anamnesis.medicalClearance?v==="Sim":v==="Não")?G:"#f1f5f9",color:(ns.anamnesis.medicalClearance?v==="Sim":v==="Não")?"#fff":GR,padding:"5px 14px",fontSize:12}} onClick={()=>setA("medicalClearance",v==="Sim")}>{v}</button>)}</div>
              </div>
              <div style={{marginTop:10}}><label style={LBL}>Exercícios proibidos pelo médico</label><input style={INP} value={ns.anamnesis.forbiddenExercises} onChange={e=>setA("forbiddenExercises",e.target.value)} placeholder="Ex: Impacto, carga axial..."/></div>
              <div style={{marginTop:10}}><label style={LBL}>Maior medo em relação ao treino</label><input style={INP} value={ns.anamnesis.biggestFear} onChange={e=>setA("biggestFear",e.target.value)} placeholder="Ex: Cair, lesionar..."/></div>
              {nsRisk&&<div style={{background:RLL,border:"1px solid #fca5a5",borderRadius:8,padding:"12px 14px",marginTop:14}}><span style={{color:RED,fontSize:13,fontWeight:600}}>⛔ Fatores de risco identificados. Recomenda-se validação médica antes de iniciar treinos intensos.</span></div>}
              <div style={{marginTop:16,display:"flex",justifyContent:"space-between"}}>
                <button style={BTNO} onClick={()=>setStep(0)}>← Anterior</button>
                <button style={BTN} onClick={()=>setStep(2)}>Próximo →</button>
              </div>
            </div>
          )}

          {step===2&&(
            <div style={C}>
              <div style={{fontSize:16,fontWeight:700,marginBottom:4}}>Perfil motivacional</div>
              <div style={{fontSize:12,color:GR,marginBottom:18}}>Estas respostas ajudam a personalizar o plano e a mensagem do treinador</div>

              {/* Motivação com labels */}
              <div style={{marginBottom:20}}>
                <label style={LBL}>Nível de motivação atual: <strong style={{color:G,fontSize:15}}>{ns.motivationLevel}/10</strong></label>
                <input type="range" min={1} max={10} step={1} value={ns.motivationLevel} onChange={e=>setNs(p=>({...p,motivationLevel:parseInt(e.target.value)}))} style={{width:"100%",height:6,marginTop:8,marginBottom:4}}/>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#94a3b8"}}>
                  <span>😔 Muito baixa</span><span>😐 Moderada</span><span>🔥 Muito alta</span>
                </div>
              </div>

              {/* Experiência anterior */}
              <div style={{marginBottom:16}}>
                <label style={LBL}>Já praticou exercício antes?</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {["Nunca pratiquei","Pratiquei há muito tempo","Parei há menos de 1 ano","Pratico ocasionalmente","Pratico regularmente"].map(v=>(
                    <button key={v} style={{...BS,background:ns.priorExperience===v?G:"#f1f5f9",color:ns.priorExperience===v?"#fff":GR,fontSize:11,padding:"6px 10px",margin:"2px 0"}} onClick={()=>setNs(p=>({...p,priorExperience:v}))}>{v}</button>
                  ))}
                </div>
              </div>

              {/* Disponibilidade horária */}
              <div style={{marginBottom:16}}>
                <label style={LBL}>Melhor horário para treinar</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {["Manhã cedo (6h-9h)","Manhã (9h-12h)","Tarde (12h-15h)","Final da tarde (15h-18h)","Noite (18h-21h)"].map(v=>(
                    <button key={v} style={{...BS,background:ns.preferredTime===v?G:"#f1f5f9",color:ns.preferredTime===v?"#fff":GR,fontSize:11,padding:"6px 10px",margin:"2px 0"}} onClick={()=>setNs(p=>({...p,preferredTime:v}))}>{v}</button>
                  ))}
                </div>
              </div>

              {/* Limitação principal */}
              <div style={{marginBottom:16}}>
                <label style={LBL}>O que mais preocupa em relação ao treino?</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {["Medo de me lesionar","Medo de cair","Não conseguir acompanhar","Dores durante o exercício","Falta de energia","Falta de tempo","Nada em especial"].map(v=>(
                    <button key={v} style={{...BS,background:ns.mainConcern===v?G:"#f1f5f9",color:ns.mainConcern===v?"#fff":GR,fontSize:11,padding:"6px 10px",margin:"2px 0"}} onClick={()=>setNs(p=>({...p,mainConcern:v}))}>{v}</button>
                  ))}
                </div>
              </div>

              {/* O que quer melhorar */}
              <div style={{marginBottom:16}}>
                <label style={LBL}>O que mais quer melhorar no dia a dia?</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {["Subir escadas sem cansar","Carregar compras","Brincar com netos","Dormir melhor","Ter mais energia","Reduzir dores","Andar sem dificuldade","Ser mais independente"].map(v=>(
                    <button key={v} style={{...BS,background:(ns.dailyGoal||"").includes(v)?G:"#f1f5f9",color:(ns.dailyGoal||"").includes(v)?"#fff":GR,fontSize:11,padding:"6px 10px",margin:"2px 0"}} onClick={()=>{
                      const cur=(ns.dailyGoal||"").split(",").filter(x=>x.trim());
                      const idx=cur.indexOf(v);
                      if(idx>=0)cur.splice(idx,1);else cur.push(v);
                      setNs(p=>({...p,dailyGoal:cur.join(", ")}));
                    }}>{v}</button>
                  ))}
                </div>
                <div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>Podes escolher várias opções</div>
              </div>

              {/* Campo livre */}
              <div style={{marginBottom:12}}>
                <label style={LBL}>Alguma coisa importante que o treinador deva saber?</label>
                <textarea style={{...INP,height:60,resize:"vertical"}} value={ns.worthIt||""} onChange={e=>setNs(p=>({...p,worthIt:e.target.value}))} placeholder="Ex: tenho um casamento em junho, quero perder 5kg antes..."/>
              </div>

              <div style={{marginTop:16,display:"flex",justifyContent:"space-between"}}>
                <button style={BTNO} onClick={()=>setStep(1)}>← Anterior</button>
                <button style={{...BTN,opacity:loading?.6:1}} onClick={saveStudent} disabled={loading||!ns.name.trim()}>{loading?"A guardar...":"✓ Criar aluno"}</button>
              </div>
            </div>
          )}
        </div>
      </div>
    );
  }

  // ═══ DETALHE ALUNO ════════════════════════════════════════
  if(view==="student"&&s){
    const TABS=[{k:"overview",l:"Visão Geral"},{k:"diagnosis",l:"Diagnóstico IA"},{k:"plan",l:"Plano"},{k:"classes",l:"Aulas"},{k:"evolution",l:"Evolução"},{k:"report",l:"Relatório"}];
    const sRisk=s.anamnesis&&(s.anamnesis.chestPain||s.anamnesis.heartProblems||s.anamnesis.dizziness||s.anamnesis.recentFalls);
    const initials=s.name.split(" ").slice(0,2).map(x=>x[0]||"").join("").toUpperCase();
    return(
      <div style={{minHeight:"100vh",background:"#f8fafc"}}>
        <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <div style={{maxWidth:860,margin:"0 auto",padding:"0 16px"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,height:52}}>
              <button style={BG} onClick={()=>setView("dashboard")}>← Voltar</button>
              <div style={{width:36,height:36,borderRadius:"50%",background:GL,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:800,color:GD,flexShrink:0}}>{initials}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                <div style={{fontSize:11,color:GR}}>{s.age}a · {s.primaryGoal} · {s.sessionsPerWeek}x/sem</div>
              </div>
              <span style={{...sc(s.status),borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600,flexShrink:0,whiteSpace:"nowrap"}}>{s.status}</span>
            </div>
            <div style={{display:"flex",overflowX:"auto",scrollbarWidth:"none"}}>
              {TABS.map(t=><button key={t.k} style={{background:"transparent",border:"none",borderBottom:tab===t.k?`2.5px solid ${G}`:"2.5px solid transparent",padding:"8px 12px",fontSize:12,fontWeight:tab===t.k?700:400,color:tab===t.k?G:GR,cursor:"pointer",whiteSpace:"nowrap",transition:"all .15s"}} onClick={()=>{setTab(t.k);if(t.k!=="plan")setAiOut("");}}>{t.l}</button>)}
            </div>
          </div>
        </div>

        {showAdj&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(15,23,42,.65)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>

            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div style={{fontSize:15,fontWeight:700}}>Relatório mensal</div>
                <button style={BS} onClick={genReport} disabled={aiLoad}>{aiLoad?"A gerar...":"↺ Novo relatório"}</button>
              </div>
              {emailMsg&&<div style={{background:emailMsg.startsWith("✅")?GL:RLL,border:`1px solid ${emailMsg.startsWith("✅")?"#86efac":"#fca5a5"}`,borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:13,fontWeight:500}}>{emailMsg}</div>}
              {aiLoad&&<div style={{...C,textAlign:"center",color:GR,padding:"3rem 1rem"}}><div style={{fontSize:36,marginBottom:12}}>🤖</div>A criar relatório mensal...</div>}
              {!aiLoad&&s.monthlyReport&&(
                <>
                  <div style={{...C,padding:"20px 22px"}}><MDRenderer content={s.monthlyReport} color="#d97706"/></div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
                    <button style={{...BS,background:"#0ea5e9",color:"#fff",border:"none",opacity:emailSending?.7:1}} disabled={emailSending} onClick={async()=>{
                      setEmailSending(true);setEmailMsg("");
                      const mes=new Date().toLocaleDateString("pt-PT",{month:"long",year:"numeric"});
                      const res=await sendEmail(tok,s.email,`Relatório Mensal ${mes} — ${s.name}`,s.name,s.monthlyReport,"report");
                      setEmailMsg(res.ok?"✅ Relatório enviado para igsolutionmkt@gmail.com (reencaminha ao aluno)":"❌ Erro: "+(res.error||"Falhou"));
                      setEmailSending(false);
                    }}>{emailSending?"A enviar...":"✉️ Enviar por Email"}</button>
                    <button style={{...BS,background:"#dc2626",color:"#fff",border:"none"}} onClick={()=>{
                      const mes=new Date().toLocaleDateString("pt-PT",{month:"long",year:"numeric"});
                      const ok=exportPDF("Relatório Mensal "+mes,s.name,s.monthlyReport,"report");
                      if(!ok)setEmailMsg("❌ Erro ao gerar PDF.");
                    }}>📄 Guardar PDF</button>
                  </div>
                </>
              )}
              {!aiLoad&&!s.monthlyReport&&<div style={{...C,textAlign:"center",padding:"3rem 1rem"}}><div style={{fontSize:42,marginBottom:12}}>📊</div><div style={{color:GR,marginBottom:16}}>Nenhum relatório gerado ainda.</div><button style={BTN} onClick={genReport}>Gerar relatório com IA</button></div>}
            </div>
          )}

          <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:24,padding:"0 16px"}}>⚕️ Ferramenta de apoio ao treinador. Não substitui avaliação médica, fisioterapêutica ou nutricional.</p>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
