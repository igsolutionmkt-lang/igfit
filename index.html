function hdrs(t){return{"Content-Type":"application/json",apikey:KEY,Authorization:`Bearer ${t||KEY}`,Prefer:"return=representation"};}
async function sbAuth(e,p,m="login"){
  const u=m==="login"?`${SB}/auth/v1/token?grant_type=password`:`${SB}/auth/v1/signup`;
  return(await fetch(u,{method:"POST",headers:{"Content-Type":"application/json",apikey:KEY},body:JSON.stringify({email:e,password:p})})).json();
}
async function sbGet(path,t){
  const r=await fetch(`${SB}/rest/v1/${path}`,{headers:hdrs(t)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function sbPost(path,body,t){
  const r=await fetch(`${SB}/rest/v1/${path}`,{method:"POST",headers:hdrs(t),body:JSON.stringify(body)});
  if(!r.ok)throw new Error(await r.text());
  return r.json();
}
async function callAI(prompt,t){
  try{
    const r=await fetch(EF,{method:"POST",headers:{"Content-Type":"application/json",Authorization:`Bearer ${t}`},body:JSON.stringify({prompt})});
    const d=await r.json();
    return d.text||"Sem resposta.";
  }catch(e){return"Erro: "+e.message;}
}

function fromDB(row){
  const a=row.igfit_anamnesis?.[0]||{};
  const measurements=(row.igfit_measurements||[])
    .map(m=>({id:m.id,label:new Date(m.measured_at+"T12:00:00").toLocaleDateString("pt-PT",{day:"2-digit",month:"2-digit"}),rawDate:m.measured_at,weight:+m.weight,waist:+m.waist,abdomen:+m.abdomen}))
    .sort((a,b)=>new Date(a.rawDate)-new Date(b.rawDate));
  const classLogs=(row.igfit_class_logs||[])
    .map(l=>({id:l.id,date:new Date(l.session_date+"T12:00:00").toLocaleDateString("pt-PT",{day:"2-digit",month:"2-digit"}),rawDate:l.session_date,training:l.training,status:l.status,effort:l.effort,pain:l.pain,energy:l.energy,notes:l.notes}))
    .sort((a,b)=>new Date(b.rawDate)-new Date(a.rawDate));
  const outs=(row.igfit_ai_outputs||[]).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const byType={};outs.forEach(o=>{if(!byType[o.type])byType[o.type]=o.content;});
  const alerts=(row.igfit_alerts||[]).filter(x=>!x.resolved).map(x=>({id:x.id,type:x.type,msg:x.message}));
  return{
    id:row.id,name:row.name,age:row.age,sex:row.sex,phone:row.phone,email:row.email,
    height:row.height,weight:row.weight,targetWeight:row.target_weight,
    sessionsPerWeek:row.sessions_per_week,sessionDuration:row.session_duration,
    primaryGoal:row.primary_goal,secondaryGoal:row.secondary_goal,
    location:row.location,status:row.status,
    anamnesis:{
      hypertension:!!a.hypertension,diabetes:!!a.diabetes,highCholesterol:!!a.high_cholesterol,
      heartProblems:!!a.heart_problems,osteoporosis:!!a.osteoporosis,arthrosis:!!a.arthrosis,
      hernia:!!a.hernia,lowerBackPain:!!a.lower_back_pain,kneePain:!!a.knee_pain,
      shoulderPain:!!a.shoulder_pain,hadSurgery:!!a.had_surgery,recentFalls:!!a.recent_falls,
      dizziness:!!a.dizziness,shortBreath:!!a.short_breath,chestPain:!!a.chest_pain,
      medication:a.medication||"",medicalClearance:!!a.medical_clearance,
      forbiddenExercises:a.forbidden_exercises||"",biggestFear:a.biggest_fear||"",
    },
    measurements,classLogs,
    diagnosis:byType["diagnosis"]||null,
    trainingPlan:byType["training_plan"]||null,
    monthlyReport:byType["monthly_report"]||null,
    alerts,
  };
}

// Gráfico SVG simples
function LineGraph({data,dataKey,color,unit}){
  if(!data||data.length<2)return null;
  const vals=data.map(d=>d[dataKey]).filter(v=>v!=null&&!isNaN(v));
  if(vals.length<2)return null;
  const W=500,H=120,padL=40,padR=10,padT=10,padB=24;
  const minV=Math.min(...vals),maxV=Math.max(...vals);
  const range=maxV-minV||1;
  const xs=data.map((_,i)=>padL+(i/(data.length-1))*(W-padL-padR));
  const ys=data.map(d=>padT+((maxV-(d[dataKey]||minV))/range)*(H-padT-padB));
  const path=xs.map((x,i)=>`${i===0?"M":"L"}${x},${ys[i]}`).join(" ");
  return(
    <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height:H}}>
      <path d={path} fill="none" stroke={color} strokeWidth="2.5" strokeLinejoin="round"/>
      {data.map((d,i)=>(
        <g key={i}>
          <circle cx={xs[i]} cy={ys[i]} r="4" fill={color}/>
          <text x={xs[i]} y={H-4} textAnchor="middle" fontSize="9" fill={GR}>{d.label}</text>
          <text x={xs[i]} y={ys[i]-8} textAnchor="middle" fontSize="9" fill={color} fontWeight="600">{d[dataKey]}{unit}</text>
        </g>
      ))}
    </svg>
  );
}

                      const mes=new Date().toLocaleDateString("pt-PT",{month:"long",year:"numeric"});
                      const assunto=encodeURIComponent(`Relatório Mensal ${mes} — ${s.name}`);
                      const corpo=encodeURIComponent(`Olá ${s.name.split(" ")[0]}!\n\nSegue o seu relatório mensal de ${mes}.\n\n━━━━━━━━━━━━━━━━━━━━━━\n${s.monthlyReport}\n━━━━━━━━━━━━━━━━━━━━━━\n\nContinua o excelente trabalho! 💪\n\nCum. cumprimentos,\nIG Solution — Personal Training`);
                      window.open(`mailto:${dest}?subject=${assunto}&body=${corpo}`,"_blank");
                    }}>✉️ Enviar por Email</button>
                    <button style={BTNO} onClick={()=>{const blob=new Blob([s.monthlyReport],{type:"text/plain"});const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`relatorio-${s.name.replace(/ /g,"_")}.txt`;a.click();}}>⬇ Exportar .txt</button>
                  </div>
                  {!s.email&&<div style={{background:ALL,border:"1px solid #fcd34d",borderRadius:8,padding:"10px 14px",marginTop:10,fontSize:13}}>⚠️ Aluno sem email registado. Adiciona o email nos dados para enviar diretamente.</div>}
                </>
              )}
              {!aiLoad&&!s.monthlyReport&&<div style={{...C,textAlign:"center",padding:"3rem 1rem"}}><div style={{fontSize:42,marginBottom:12}}>📊</div><div style={{color:GR,marginBottom:16}}>Nenhum relatório gerado ainda.</div><button style={BTN} onClick={genReport}>Gerar relatório com IA</button></div>}
            </div>
          )}

          <p style={{fontSize:11,color:"#94a3b8",textAlign:"center",marginTop:24,padding:"0 16px"}}>⚕️ Ferramenta de apoio ao treinador. Não substitui avaliação médica, fisioterapêutica ou nutricional.</p>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
